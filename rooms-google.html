<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Availability</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --free: #00c896;
    --busy: #ff4d6a;
    --soon: #f5a623;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --accent: #7c6fff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 40px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
  }

  #signin-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    gap: 24px;
    text-align: center;
  }

  #signin-screen h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }

  #signin-screen p {
    font-size: 14px;
    color: var(--muted);
    max-width: 320px;
    line-height: 1.6;
  }

  #signin-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 28px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    margin-top: 8px;
  }

  #signin-btn:hover {
    border-color: var(--accent);
    background: rgba(124,111,255,0.06);
  }

  #signin-btn svg { width: 20px; height: 20px; flex-shrink: 0; }

  #main-screen { display: none; }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .header-left .date {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .header-right { text-align: right; }

  #clock {
    font-family: 'DM Mono', monospace;
    font-size: 42px;
    font-weight: 400;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;
  }

  .header-meta {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 16px;
    margin-top: 6px;
  }

  .refresh-info { font-size: 11px; color: var(--muted); letter-spacing: 0.05em; }

  #signout-btn {
    font-size: 11px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 3px 10px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    letter-spacing: 0.05em;
    transition: color 0.2s, border-color 0.2s;
  }

  #signout-btn:hover { color: var(--text); border-color: var(--muted); }

  .legend {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .room-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.4s ease both;
  }

  .room-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 12px 12px 0 0;
  }

  .room-card.free::before { background: var(--free); }
  .room-card.busy::before { background: var(--busy); }
  .room-card.soon::before { background: var(--soon); }

  .room-card.free { border-color: rgba(0,200,150,0.2);  background: color-mix(in srgb, var(--surface) 95%, var(--free)); }
  .room-card.busy { border-color: rgba(255,77,106,0.2); background: color-mix(in srgb, var(--surface) 95%, var(--busy)); }
  .room-card.soon { border-color: rgba(245,166,35,0.2);  background: color-mix(in srgb, var(--surface) 95%, var(--soon)); }

  .room-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .room-name {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
    max-width: 70%;
  }

  .status-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  .free .status-badge { background: rgba(0,200,150,0.08);  color: var(--free); border: 1px solid rgba(0,200,150,0.3); }
  .busy .status-badge { background: rgba(255,77,106,0.08); color: var(--busy); border: 1px solid rgba(255,77,106,0.3); }
  .soon .status-badge { background: rgba(245,166,35,0.08);  color: var(--soon); border: 1px solid rgba(245,166,35,0.3); }

  .room-detail { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .event-title {
    font-size: 15px;
    color: var(--text);
    font-weight: 400;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .time-range {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .free-until {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--free);
  }

  .upcoming {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .upcoming-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .upcoming-event {
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }

  .upcoming-event span:first-child {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    opacity: 0.7;
  }

  .up-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    flex-shrink: 0;
    color: var(--muted);
  }

  .loading-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 13px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  .pulse {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--free);
    margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  .busy .pulse { background: var(--busy); }
  .soon .pulse { background: var(--soon); }

  @keyframes spin   { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse  { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
</style>
</head>
<body>
<div class="wrapper">

  <div id="signin-screen">
    <div>
      <h1>Room Availability</h1>
    </div>
    <p>Sign in with your work Google account to view live room availability.</p>
    <button id="signin-btn" onclick="signIn()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Sign in with Google
    </button>
  </div>

  <div id="main-screen">
    <header>
      <div class="header-left">
        <h1>Room Availability</h1>
        <div class="date" id="date-display"></div>
      </div>
      <div class="header-right">
        <div id="clock"></div>
        <div class="header-meta">
          <div class="refresh-info">Updates every 60s</div>
          <button id="signout-btn" onclick="signOut()">Sign out</button>
        </div>
      </div>
    </header>

    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--free)"></div> Available</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--busy)"></div> In use</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--soon)"></div> Available, booked soon</div>
    </div>

    <div class="grid" id="grid"></div>
  </div>

</div>

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CLIENT_ID = '202197820281-0v51dp4nnl82psglvrulr8mjfj8j7ud7.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar.readonly';

const ROOMS = [
  { name: 'Suite 304',               id: 'c_1888jbc44gbfmivuj0kqd3cg5tkjg@resource.calendar.google.com' },
  { name: 'Library',                 id: 'c_1884o1euj6jpcjmkivki809ph6e46@resource.calendar.google.com' },
  { name: 'Living Room',             id: 'c_18839hvqeg36mijflh8flr3t92amc@resource.calendar.google.com' },
  { name: 'Office 1 (Podcast)',      id: 'c_1883t3em6qhcci9ih23lo45cqqp0s@resource.calendar.google.com' },
  { name: 'Office 2 (Yoga)',         id: 'c_188cp5nig94fkjucmfivlrj5r4mdm@resource.calendar.google.com' },
  { name: 'Office 3',                id: 'c_1882otj75pcmijacj6tkf4u2j7p8u@resource.calendar.google.com' },
  { name: 'Small Conference Room 1', id: 'c_1883gc0li8dukh68jlbkv6vlq0k6q@resource.calendar.google.com' },
  { name: 'Small Conference Room 2', id: 'c_188f6jpkkngamgnohrdt93j6pf77q@resource.calendar.google.com' },
];

let accessToken = null;
let refreshTimer = null;

function signIn() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: (response) => {
      if (response.access_token) {
        accessToken = response.access_token;
        document.getElementById('signin-screen').style.display = 'none';
        document.getElementById('main-screen').style.display = 'block';
        refresh();
        clearInterval(refreshTimer);
        refreshTimer = setInterval(refresh, 60000);
      }
    },
  });
  client.requestAccessToken();
}

function signOut() {
  if (accessToken) google.accounts.oauth2.revoke(accessToken);
  accessToken = null;
  clearInterval(refreshTimer);
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('signin-screen').style.display = 'flex';
}

function fmt(date) {
  return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}

async function fetchRoom(room) {
  const now = new Date();
  const later = new Date(now.getTime() + 12 * 60 * 60 * 1000);
  const calId = encodeURIComponent(room.id);
  const url = `https://www.googleapis.com/calendar/v3/calendars/${calId}/events`
    + `?timeMin=${now.toISOString()}`
    + `&timeMax=${later.toISOString()}`
    + `&singleEvents=true&orderBy=startTime&maxResults=5`;

  const res = await fetch(url, { headers: { Authorization: `Bearer ${accessToken}` } });
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const data = await res.json();
  return data.items || [];
}

function renderRoom(room, events, delay) {
  const now = new Date();

  const current = events.find(e => {
    const start = new Date(e.start.dateTime || e.start.date);
    const end   = new Date(e.end.dateTime   || e.end.date);
    return start <= now && end > now;
  });

  const upcoming = events.find(e => new Date(e.start.dateTime || e.start.date) > now);

  let statusClass, badgeText, detailHTML;

  if (current) {
    const end  = new Date(current.end.dateTime || current.end.date);
    const next = events.find(e => new Date(e.start.dateTime || e.start.date) >= end);
    statusClass = 'busy';
    badgeText   = 'In use';
    detailHTML  = `
      <div class="event-title">${current.summary || 'Busy'}</div>
      <div class="time-range">${fmt(new Date(current.start.dateTime))} – ${fmt(end)}</div>
      ${next ? `<div class="upcoming"><div class="upcoming-label">Up next</div>
        <div class="upcoming-event"><span>${next.summary || 'Booked'}</span>
        <span class="up-time">${fmt(new Date(next.start.dateTime))}</span></div></div>` : ''}`;

  } else if (upcoming) {
    const mins  = Math.round((new Date(upcoming.start.dateTime) - now) / 60000);
    statusClass = mins <= 30 ? 'soon' : 'free';
    badgeText   = mins <= 30 ? `in ${mins}m` : 'Available';
    const freeMsg = mins <= 30
      ? `<div class="free-until">Free for ${mins} more min</div>`
      : `<div class="free-until">Free until ${fmt(new Date(upcoming.start.dateTime))}</div>`;
    detailHTML  = `${freeMsg}
      <div class="upcoming"><div class="upcoming-label">Up next</div>
        <div class="upcoming-event"><span>${upcoming.summary || 'Booked'}</span>
        <span class="up-time">${fmt(new Date(upcoming.start.dateTime))}</span></div></div>`;

  } else {
    statusClass = 'free';
    badgeText   = 'Available';
    detailHTML  = `<div class="free-until">Free for the rest of the day</div>`;
  }

  return `
    <div class="room-card ${statusClass}" style="animation-delay:${delay}ms">
      <div class="room-header">
        <div class="room-name"><span class="pulse"></span>${room.name}</div>
        <div class="status-badge">${badgeText}</div>
      </div>
      <div class="room-detail">${detailHTML}</div>
    </div>`;
}

async function refresh() {
  const grid = document.getElementById('grid');
  grid.innerHTML = ROOMS.map(() => `<div class="loading-card"><div class="spinner"></div>Loading...</div>`).join('');

  const results = await Promise.allSettled(ROOMS.map(r => fetchRoom(r)));

  grid.innerHTML = results.map((result, i) => {
    const delay = i * 60;
    return result.status === 'fulfilled'
      ? renderRoom(ROOMS[i], result.value, delay)
      : `<div style="background:var(--surface);border:1px solid rgba(255,77,106,0.2);border-radius:12px;padding:24px;color:var(--busy);font-size:13px;animation:fadeIn 0.4s ease ${delay}ms both">
           <div style="font-size:15px;color:var(--text);margin-bottom:4px">${ROOMS[i].name}</div>
           Could not load — check calendar access
         </div>`;
  }).join('');
}

function updateClock() {
  const now = new Date();
  const c = document.getElementById('clock');
  const d = document.getElementById('date-display');
  if (c) c.textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
  if (d) d.textContent = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
