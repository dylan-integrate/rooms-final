<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Room Availability</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --border: #1e1e2e;
    --free: #00c896;
    --busy: #ff4d6a;
    --soon: #f5a623;
    --text: #e8e8f0;
    --muted: #5a5a72;
    --accent: #7c6fff;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    padding: 40px;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 48px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }

  .header-left h1 {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .header-left .date {
    font-family: 'DM Mono', monospace;
    font-size: 28px;
    font-weight: 400;
    color: var(--text);
    letter-spacing: -0.02em;
  }

  .header-right { text-align: right; }

  #clock {
    font-family: 'DM Mono', monospace;
    font-size: 42px;
    font-weight: 400;
    letter-spacing: -0.03em;
    color: var(--text);
    line-height: 1;
  }

  .refresh-info {
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .legend {
    display: flex;
    gap: 24px;
    margin-bottom: 32px;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }

  .room-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    position: relative;
    overflow: hidden;
    animation: fadeIn 0.4s ease both;
  }

  .room-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 12px 12px 0 0;
  }

  .room-card.free::before { background: var(--free); }
  .room-card.busy::before { background: var(--busy); }
  .room-card.soon::before { background: var(--soon); }

  .room-card.free { border-color: rgba(0,200,150,0.2);  background: color-mix(in srgb, var(--surface) 95%, var(--free)); }
  .room-card.busy { border-color: rgba(255,77,106,0.2); background: color-mix(in srgb, var(--surface) 95%, var(--busy)); }
  .room-card.soon { border-color: rgba(245,166,35,0.2);  background: color-mix(in srgb, var(--surface) 95%, var(--soon)); }

  .room-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 20px;
  }

  .room-name {
    font-size: 17px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.2;
    max-width: 70%;
  }

  .status-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 20px;
    flex-shrink: 0;
  }

  .free .status-badge { background: rgba(0,200,150,0.08);  color: var(--free); border: 1px solid rgba(0,200,150,0.3); }
  .busy .status-badge { background: rgba(255,77,106,0.08); color: var(--busy); border: 1px solid rgba(255,77,106,0.3); }
  .soon .status-badge { background: rgba(245,166,35,0.08);  color: var(--soon); border: 1px solid rgba(245,166,35,0.3); }

  .room-detail { font-size: 13px; color: var(--muted); line-height: 1.6; }

  .event-title {
    font-size: 15px;
    color: var(--text);
    font-weight: 400;
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .time-range {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--muted);
  }

  .free-until {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--free);
  }

  .upcoming {
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .upcoming-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .upcoming-event {
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    gap: 8px;
  }

  .upcoming-event span:first-child {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    opacity: 0.7;
  }

  .up-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    flex-shrink: 0;
    color: var(--muted);
  }

  .loading-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--muted);
    font-size: 13px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  .pulse {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--free);
    margin-right: 6px;
    animation: pulse 2s ease-in-out infinite;
    vertical-align: middle;
    position: relative;
    top: -1px;
  }

  .busy .pulse { background: var(--busy); }
  .soon .pulse { background: var(--soon); }

  @keyframes spin   { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse  { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="header-left">
      <h1>Room Availability</h1>
      <div class="date" id="date-display"></div>
    </div>
    <div class="header-right">
      <div id="clock"></div>
      <div class="refresh-info">Updates every 60s</div>
    </div>
  </header>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--free)"></div> Available</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--busy)"></div> In use</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--soon)"></div> Available, booked soon</div>
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
const WORKER_URL = 'https://room-api.dylan-89b.workers.dev';
const API_SECRET = 'DsEjsQPy8j6KUxtQ3HnU';

function fmt(date) {
  return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
}

function renderRoom(room, delay) {
  const now = new Date();
  const events = room.events || [];

  const current = events.find(e => {
    const start = new Date(e.start.dateTime || e.start.date);
    const end   = new Date(e.end.dateTime   || e.end.date);
    return start <= now && end > now;
  });

  const upcoming = events.find(e => new Date(e.start.dateTime || e.start.date) > now);

  let statusClass, badgeText, detailHTML;

  if (current) {
    const end  = new Date(current.end.dateTime || current.end.date);
    const next = events.find(e => new Date(e.start.dateTime || e.start.date) >= end);
    statusClass = 'busy';
    badgeText   = 'In use';
    detailHTML  = `
      <div class="event-title">${current.summary || 'Busy'}</div>
      <div class="time-range">${fmt(new Date(current.start.dateTime))} – ${fmt(end)}</div>
      ${next ? `<div class="upcoming"><div class="upcoming-label">Up next</div>
        <div class="upcoming-event"><span>${next.summary || 'Booked'}</span>
        <span class="up-time">${fmt(new Date(next.start.dateTime))}</span></div></div>` : ''}`;

  } else if (upcoming) {
    const mins  = Math.round((new Date(upcoming.start.dateTime) - now) / 60000);
    statusClass = mins <= 30 ? 'soon' : 'free';
    badgeText   = mins <= 30 ? `in ${mins}m` : 'Available';
    const freeMsg = mins <= 30
      ? `<div class="free-until">Free for ${mins} more min</div>`
      : `<div class="free-until">Free until ${fmt(new Date(upcoming.start.dateTime))}</div>`;
    detailHTML  = `${freeMsg}
      <div class="upcoming"><div class="upcoming-label">Up next</div>
        <div class="upcoming-event"><span>${upcoming.summary || 'Booked'}</span>
        <span class="up-time">${fmt(new Date(upcoming.start.dateTime))}</span></div></div>`;

  } else {
    statusClass = 'free';
    badgeText   = 'Available';
    detailHTML  = `<div class="free-until">Free for the rest of the day</div>`;
  }

  return `
    <div class="room-card ${statusClass}" style="animation-delay:${delay}ms">
      <div class="room-header">
        <div class="room-name"><span class="pulse"></span>${room.name}</div>
        <div class="status-badge">${badgeText}</div>
      </div>
      <div class="room-detail">${detailHTML}</div>
    </div>`;
}

async function refresh() {
  const grid = document.getElementById('grid');
  grid.innerHTML = Array(8).fill(0).map(() =>
    `<div class="loading-card"><div class="spinner"></div>Loading...</div>`
  ).join('');

  try {
    const res = await fetch(WORKER_URL, {
      headers: { 'x-api-secret': API_SECRET }
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const rooms = await res.json();
    grid.innerHTML = rooms.map((room, i) => renderRoom(room, i * 60)).join('');
  } catch (err) {
    grid.innerHTML = `<div style="color:var(--busy);padding:24px">Could not connect to data source. Retrying...</div>`;
  }
}

function updateClock() {
  const now = new Date();
  const clockEl = document.getElementById('clock');
  const dateEl  = document.getElementById('date-display');
  if (clockEl) clockEl.textContent = now.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', second: '2-digit', hour12: true });
  if (dateEl)  dateEl.textContent  = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
}

setInterval(updateClock, 1000);
setInterval(refresh, 60000);
updateClock();
refresh();
</script>
</body>
</html>
